services:
  - type: web
    name: devmox-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GROQ_API_KEY
        sync: false
      - key: CHROMA_PATH
        value: ./chroma_db
      - key: UPLOAD_FOLDER
        value: uploads
      - key: ALLOWED_ORIGINS
        value: "*"
